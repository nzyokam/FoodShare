name: foodshare
description: "A Flutter app to combat hunger and food waste by connecting surplus food donors with nearby shelters, volunteers, and community aid hubs."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Auth & HTTP
  google_sign_in: ^6.1.6
  http: ^1.1.0
  http_parser: ^4.0.0
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.5

  # Storage & preferences
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "lib/assets/light-mode.png"
  min_sdk_android: 21
  adaptive_icon_background: "#38563B"
  adaptive_icon_foreground: "lib/assets/adaptive-foreground.png"
  image_path_android_monochrome: "lib/assets/monochrome.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
